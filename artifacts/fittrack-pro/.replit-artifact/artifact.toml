kind = "web"
previewPath = "/"
title = "FitTrack Pro"
version = "1.0.0"
id = "artifacts/fittrack-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19825

[services.development]
run = "pnpm --filter @workspace/fittrack-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fittrack-pro", "run", "build" ]
publicDir = "artifacts/fittrack-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19825"
BASE_PATH = "/"
